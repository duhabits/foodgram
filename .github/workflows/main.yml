name: Foodgram workflow

on:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: foodgram_user
          POSTGRES_PASSWORD: foodgram_password
          POSTGRES_DB: foodgram
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8==6.0.0
          pip install black==23.3.0
          pip install -r ./backend/foodgram/requirements.txt
          
    #   - name: Test with flake8
    #     env:
    #       POSTGRES_USER: foodgram_user
    #       POSTGRES_PASSWORD: foodgram_password
    #       POSTGRES_DB: foodgram
    #       DB_HOST: 127.0.0.1
    #       DB_PORT: 5432
    #     run: |
    #       python -m flake8 backend/foodgram/
          
    #   - name: Test with Django tests
    #     env:
    #       POSTGRES_USER: foodgram_user
    #       POSTGRES_PASSWORD: foodgram_password
    #       POSTGRES_DB: foodgram
    #       DB_HOST: 127.0.0.1
    #       DB_PORT: 5432
    #       SECRET_KEY: test-secret-key
    #       DEBUG: 'True'
    #     run: |
    #       cd backend/foodgram/
    #       python manage.py test

  build_backend_and_push_to_docker_hub:
    name: Push backend Docker image to DockerHub
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Push backend to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./backend/foodgram
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/foodgram_backend:latest

  build_frontend_and_push_to_docker_hub:
    name: Push frontend Docker image to DockerHub
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Push frontend to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/foodgram_frontend:latest

  build_nginx_and_push_to_docker_hub:
    name: Push nginx Docker image to DockerHub
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Push nginx to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./infra
          dockerfile: Dockerfile.nginx
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/foodgram_nginx:latest

  deploy:
    runs-on: ubuntu-latest
    needs: 
      - build_backend_and_push_to_docker_hub
      - build_frontend_and_push_to_docker_hub
      - build_nginx_and_push_to_docker_hub
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        
      - name: Create necessary directories on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            mkdir -p /home/${{ secrets.USER }}/foodgram/infra
            mkdir -p /home/${{ secrets.USER }}/foodgram/data
            mkdir -p /home/${{ secrets.USER }}/foodgram/docs
            sudo chown -R ${{ secrets.USER }}:${{ secrets.USER }} /home/${{ secrets.USER }}/foodgram
            echo "✅ Directories created"
            
      - name: Show local files (debug)
        run: |
          echo "Current directory: $(pwd)"
          ls -la
          echo "Data folder content:"
          ls -la data/ || echo "Data folder not found"
          
      - name: Copy docker-compose.production.yml
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "infra/docker-compose.production.yml"
          target: "/home/${{ secrets.USER }}/foodgram/infra/"
          strip_components: 1
          rm: false
          overwrite: true
            
      - name: Copy nginx.conf
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "infra/nginx.conf"
          target: "/home/${{ secrets.USER }}/foodgram/infra/"
          strip_components: 1
          rm: false
          overwrite: true
            
      - name: Copy ingredients.csv
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "data/ingredients.csv"
          target: "/home/${{ secrets.USER }}/foodgram/data/"
          strip_components: 0
          rm: false
          overwrite: true
          
      - name: Copy docs folder (if exists)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "docs/"
          target: "/home/${{ secrets.USER }}/foodgram/docs/"
          strip_components: 0
          rm: false
          overwrite: true
        continue-on-error: true
        
      - name: Verify files on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            echo "📁 Checking copied files:"
            echo ""
            echo "=== INFRA FOLDER ==="
            ls -la /home/${{ secrets.USER }}/foodgram/infra/
            echo ""
            echo "=== DATA FOLDER ==="
            ls -la /home/${{ secrets.USER }}/foodgram/data/
            echo ""
            echo "=== INGREDIENTS FILE ==="
            if [ -f /home/${{ secrets.USER }}/foodgram/data/ingredients.csv ]; then
              echo "✅ ingredients.csv exists"
              echo "First 5 lines:"
              head -5 /home/${{ secrets.USER }}/foodgram/data/ingredients.csv
            else
              echo "❌ ingredients.csv NOT FOUND!"
            fi
            
      - name: Create .env file
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd /home/${{ secrets.USER }}/foodgram/infra
            echo "DB_NAME=${{ secrets.DB_NAME }}" > .env
            echo "DB_USER=${{ secrets.DB_USER }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_HOST=db" >> .env
            echo "DB_PORT=5432" >> .env
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
            echo "DEBUG=False" >> .env
            echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" >> .env
            echo "ALLOWED_HOSTS=${{ secrets.HOST }},localhost,127.0.0.1" >> .env
            echo "✅ .env file created:"
            cat .env | grep -v PASSWORD | grep -v KEY
            
      - name: Deploy with docker compose
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd /home/${{ secrets.USER }}/foodgram/infra
            
            echo "🐳 Pulling Docker images..."
            sudo docker compose -f docker-compose.production.yml pull
            
            echo "🛑 Stopping old containers..."
            sudo docker compose -f docker-compose.production.yml down
            
            echo "🚀 Starting new containers..."
            sudo docker compose -f docker-compose.production.yml up -d
            
            echo "⏳ Waiting for containers to start..."
            sleep 15
            
            echo "📊 Container status:"
            sudo docker compose -f docker-compose.production.yml ps
            
            echo "🗄️ Running database migrations..."
            sudo docker compose -f docker-compose.production.yml exec -T backend python manage.py migrate
            
            echo "🏷️ Loading tags..."
            sudo docker compose -f docker-compose.production.yml exec -T backend python manage.py load_tags
            
            echo "🥕 Loading ingredients from data folder..."
            sudo docker compose -f docker-compose.production.yml exec -T backend python manage.py load_ingredients --file=data/ingredients.csv
            
            echo "📦 Collecting static files..."
            sudo docker compose -f docker-compose.production.yml exec -T backend python manage.py collectstatic --noinput
            
            echo ""
            echo "✅✅✅ DEPLOYMENT COMPLETED SUCCESSFULLY! ✅✅✅"
            echo ""
            echo "📊 Final container status:"
            sudo docker compose -f docker-compose.production.yml ps

  send_message:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Send message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ **Деплой Foodgram успешно выполнен!**
            
            📦 **Репозиторий:** ${{ github.repository }}
            🔍 **Коммит:** ${{ github.sha }}
            👤 **Автор:** ${{ github.actor }}
            📅 **Дата:** ${{ github.event.head_commit.timestamp }}
            
            🌐 **Ссылка:** http://${{ secrets.HOST }}
            
            🚀 **Статус:** Все сервисы запущены, данные загружены