name: Foodgram workflow

on:
  push:
    branches:
      - main

jobs:
  build_and_push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend/foodgram
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/foodgram_backend:latest
          
      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/foodgram_frontend:latest
          
      - name: Build and push nginx
        uses: docker/build-push-action@v4
        with:
          context: ./infra
          dockerfile: Dockerfile.nginx
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/foodgram_nginx:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        
      - name: Copy files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "infra/docker-compose.production.yml,infra/nginx.conf,data/ingredients.csv"
          target: "/home/${{ secrets.USER }}/foodgram/"
          strip_components: 1
          overwrite: true

      - name: Copy .env to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }} 
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: ".env"
          target: "/home/${{ secrets.USER }}/foodgram/"
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd /home/${{ secrets.USER }}/foodgram
            docker compose -f docker-compose.production.yml down -v || true
            

            docker compose -f docker-compose.production.yml pull
            docker compose -f docker-compose.production.yml up -d
            

            sleep 10
            

            docker compose -f docker-compose.production.yml exec -T backend python manage.py migrate --noinput
            docker compose -f docker-compose.production.yml exec -T backend python manage.py load_tags || true
            docker compose -f docker-compose.production.yml exec -T backend python manage.py load_ingredients --file=/home/${{ secrets.USER }}/foodgram/data/ingredients.csv || true
            docker compose -f docker-compose.production.yml exec -T backend python manage.py collectstatic --noinput
            
            echo "✅ Deployment completed at http://${{ secrets.HOST }}"

  send_message:
    runs-on: ubuntu-latest
    needs: deploy
    if: always() && github.ref == 'refs/heads/main'
    
    steps:
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ${{ needs.deploy.result == 'success' && '✅' || '❌' }} **Foodgram deployment ${{ needs.deploy.result == 'success' && 'succeeded' || 'failed' }}**
            📦 ${{ github.repository }}
            🔍 Commit: ${{ github.sha }}
            👤 Author: ${{ github.actor }}
            ${{ needs.deploy.result == 'success' && '🌐 http://${{ secrets.HOST }}' || '' }}