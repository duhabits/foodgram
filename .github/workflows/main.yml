name: Foodgram workflow

on:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: foodgram_user
          POSTGRES_PASSWORD: foodgram_password
          POSTGRES_DB: foodgram
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    
    steps:
      - uses: actions/checkout@v3
      
      # - name: Set up Python
      #   uses: actions/setup-python@v4
      #   with:
      #     python-version: 3.11
          
      # - name: Install dependencies
      #   run: |
      #     python -m pip install --upgrade pip
      #     pip install -r ./backend/foodgram/requirements.txt
          
      # - name: Run flake8
      #   run: |
      #     pip install flake8==6.0.0
      #     flake8 ./backend/foodgram --exclude=migrations,venv
      
      # - name: Run tests
      #   env:
      #     POSTGRES_USER: foodgram_user
      #     POSTGRES_PASSWORD: foodgram_password
      #     POSTGRES_DB: foodgram
      #     DB_NAME: foodgram
      #     DB_USER: foodgram_user
      #     DB_PASSWORD: foodgram_password
      #     DB_HOST: localhost
      #     DB_PORT: 5432
      #     SECRET_KEY: dummy_for_tests
      #     DEBUG: True
      #   run: |
      #     cd ./backend/foodgram
          # python manage.py test

  build_backend_and_push_to_docker_hub:
    name: Push backend Docker image to DockerHub
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Push backend to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./backend/foodgram
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/foodgram_backend:latest

  build_frontend_and_push_to_docker_hub:
    name: Push frontend Docker image to DockerHub
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Push frontend to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/foodgram_frontend:latest

  build_nginx_and_push_to_docker_hub:
    name: Push nginx Docker image to DockerHub
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Push nginx to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./infra
          dockerfile: Dockerfile.nginx
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/foodgram_nginx:latest

  deploy:
    runs-on: ubuntu-latest
    needs: 
      - build_backend_and_push_to_docker_hub
      - build_frontend_and_push_to_docker_hub
      - build_nginx_and_push_to_docker_hub
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        
      - name: Create directories on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            mkdir -p /home/${{ secrets.USER }}/foodgram/infra
            mkdir -p /home/${{ secrets.USER }}/foodgram/data
            sudo chown -R ${{ secrets.USER }}:${{ secrets.USER }} /home/${{ secrets.USER }}/foodgram
            
      - name: Copy docker-compose.production.yml
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "infra/docker-compose.production.yml"
          target: "/home/${{ secrets.USER }}/foodgram/infra/"
          strip_components: 1
          overwrite: true
            
      - name: Copy nginx.conf
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "infra/nginx.conf"
          target: "/home/${{ secrets.USER }}/foodgram/infra/"
          strip_components: 1
          overwrite: true
            
      - name: Copy ingredients.csv
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "data/ingredients.csv"
          target: "/home/${{ secrets.USER }}/foodgram/data/"
          strip_components: 1
          overwrite: true
          
      - name: Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd /home/${{ secrets.USER }}/foodgram/infra
            
            echo "Pulling fresh images..."
            sudo docker compose -f docker-compose.production.yml pull
            
            echo "Creating .env file..."
            cat > .env << EOF
            POSTGRES_USER=foodgram_user
            POSTGRES_PASSWORD=foodgram_password
            POSTGRES_DB=foodgram
            DB_NAME=foodgram
            DB_USER=foodgram_user 
            DB_PASSWORD=foodgram_password
            DB_HOST=db
            DB_PORT=5432
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            DEBUG=False
            ALLOWED_HOSTS=${{ secrets.HOST }},localhost,127.0.0.1
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            EOF
            
            echo "Starting containers..."
            sudo docker compose -f docker-compose.production.yml up -d --force-recreate
            
            echo "Waiting for services..."
            sleep 15
            
            echo "Running migrations..."
            sudo docker compose -f docker-compose.production.yml exec -T backend python manage.py migrate
            
            echo "Loading ingredients..."
            sudo docker compose -f docker-compose.production.yml exec -T backend python manage.py load_ingredients --file=/data/ingredients.csv
            
            echo "Collecting static files..."
            sudo docker compose -f docker-compose.production.yml exec -T backend python manage.py collectstatic --noinput
            
            echo "✅ DEPLOYMENT COMPLETED SUCCESSFULLY!"
            sudo docker compose -f docker-compose.production.yml ps