name: Foodgram workflow

on:
  push:
    branches:
      - main

jobs:
  build_backend_and_push_to_docker_hub:
    name: Push backend Docker image to DockerHub
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Push backend to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./backend/foodgram
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/foodgram_backend:latest

  build_frontend_and_push_to_docker_hub:
    name: Push frontend Docker image to DockerHub
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Push frontend to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/foodgram_frontend:latest

  build_nginx_and_push_to_docker_hub:
    name: Push nginx Docker image to DockerHub
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Push nginx to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./infra
          dockerfile: Dockerfile.nginx
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/foodgram_nginx:latest

  deploy:
      name: Deploy to Server
      runs-on: ubuntu-latest
      needs:
        - build_backend
        - build_frontend
        - build_nginx
      if: github.ref == 'refs/heads/main'

      steps:
        - uses: actions/checkout@v4

        - name: Deploy to production server
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: ${{ secrets.HOST }}
            username: ${{ secrets.USER }}
            key: ${{ secrets.SSH_KEY }}
            passphrase: ${{ secrets.SSH_PASSPHRASE }}
            script: |
              cd /home/${{ secrets.USER }}/foodgram/infra || exit 1

              echo "→ Pulling latest images ..."
              sudo docker compose -f docker-compose.production.yml pull

              echo "→ (Re)creating containers ..."
              sudo docker compose -f docker-compose.production.yml up -d --force-recreate --remove-orphans

              echo "→ Waiting for services to start (20 sec) ..."
              sleep 20

              echo "→ Checking container status ..."
              sudo docker compose -f docker-compose.production.yml ps

              echo "→ Running migrations (only migrate — no makemigrations) ..."
              sudo docker compose -f docker-compose.production.yml exec -T backend python manage.py migrate --noinput

              echo "→ Loading static tags (if command exists) ..."
              sudo docker compose -f docker-compose.production.yml exec -T backend python manage.py load_tags || echo "→ load_tags skipped (command not found or already loaded)"

              echo "→ Loading ingredients from mounted file ..."
              sudo docker compose -f docker-compose.production.yml exec -T backend python manage.py load_ingredients --file=/data/ingredients.csv || echo "→ load_ingredients failed — check path or command"

              echo "→ Collecting static files ..."
              sudo docker compose -f docker-compose.production.yml exec -T backend python manage.py collectstatic --noinput --clear

              echo ""
              echo "──────────────────────────────────────────────"
              echo "             DEPLOY FINISHED"
              echo "──────────────────────────────────────────────"
              echo ""
              sudo docker compose -f docker-compose.production.yml ps