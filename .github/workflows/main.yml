name: Foodgram workflow

on:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: foodgram_user
          POSTGRES_PASSWORD: foodgram_password
          POSTGRES_DB: foodgram
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8==6.0.0
          pip install black==23.3.0
          pip install -r ./backend/foodgram/requirements.txt

  build_backend_and_push_to_docker_hub:
    name: Push backend Docker image to DockerHub
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Push backend to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./backend/foodgram
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/foodgram_backend:latest

  build_frontend_and_push_to_docker_hub:
    name: Push frontend Docker image to DockerHub
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Push frontend to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/foodgram_frontend:latest

  build_nginx_and_push_to_docker_hub:
    name: Push nginx Docker image to DockerHub
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Push nginx to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./infra
          dockerfile: Dockerfile.nginx
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/foodgram_nginx:latest

  deploy:
    runs-on: ubuntu-latest
    needs: 
      - build_backend_and_push_to_docker_hub
      - build_frontend_and_push_to_docker_hub
      - build_nginx_and_push_to_docker_hub
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        
      - name: Create necessary directories on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            mkdir -p /home/${{ secrets.USER }}/foodgram/infra
            mkdir -p /home/${{ secrets.USER }}/foodgram/data
            mkdir -p /home/${{ secrets.USER }}/foodgram/docs
            sudo chown -R ${{ secrets.USER }}:${{ secrets.USER }} /home/${{ secrets.USER }}/foodgram
            echo "✅ Directories created"
            
      - name: Copy docker-compose.production.yml
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "infra/docker-compose.production.yml"
          target: "/home/${{ secrets.USER }}/foodgram/infra/"
          strip_components: 1
          rm: false
          overwrite: true
            
      - name: Copy nginx.conf
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "infra/nginx.conf"
          target: "/home/${{ secrets.USER }}/foodgram/infra/"
          strip_components: 1
          rm: false
          overwrite: true
            
      - name: Copy ingredients.csv
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "data/ingredients.csv"
          target: "/home/${{ secrets.USER }}/foodgram/data/"
          strip_components: 1
          rm: false
          overwrite: true
          
      - name: Deploy with docker compose - clean start with volume removal
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd /home/${{ secrets.USER }}/foodgram/infra
            
            echo "🧹 Cleaning up old containers and volumes..."
            
            # Останавливаем и удаляем ВСЕ старые контейнеры и ТОМА
            sudo docker compose -f docker-compose.production.yml down -v
            
            # Удаляем все неиспользуемые тома для очистки
            sudo docker volume prune -f
            
            echo "🐳 Pulling fresh Docker images..."
            sudo docker compose -f docker-compose.production.yml pull
            
            echo "📝 Creating complete .env file (with PostgreSQL variables)..."
            cat > .env << EOF
# PostgreSQL credentials
POSTGRES_USER=foodgram_user
POSTGRES_PASSWORD=foodgram_password
POSTGRES_DB=foodgram

# Django database settings
DB_NAME=foodgram
DB_USER=foodgram_user
DB_PASSWORD=foodgram_password
DB_HOST=db
DB_PORT=5432

# Django settings
SECRET_KEY=${{ secrets.SECRET_KEY }}
DEBUG=False
ALLOWED_HOSTS=${{ secrets.HOST }},localhost,127.0.0.1,158.160.31.143

# Docker
DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
EOF

            echo "✅ .env file created:"
            cat .env | grep -v PASSWORD | grep -v KEY
            
            echo "🚀 Starting fresh containers..."
            sudo docker compose -f docker-compose.production.yml up -d
            
            echo "⏳ Waiting for database to be ready (30 seconds)..."
            sleep 30
            
            echo "📊 Container status:"
            sudo docker compose -f docker-compose.production.yml ps
            
            # Проверяем, запустилась ли база данных
            echo "🔍 Checking database logs:"
            sudo docker compose -f docker-compose.production.yml logs db | tail -20
            
            echo "🗄️ Running database migrations from scratch..."
            sudo docker compose -f docker-compose.production.yml exec -T backend python manage.py makemigrations user
            sudo docker compose -f docker-compose.production.yml exec -T backend python manage.py makemigrations food
            sudo docker compose -f docker-compose.production.yml exec -T backend python manage.py migrate
            
            # Проверяем наличие таблиц
            echo "🔍 Checking database tables:"
            sudo docker compose -f docker-compose.production.yml exec -T backend python manage.py dbshell -c "\dt"
            
            echo "🏷️ Loading tags..."
            sudo docker compose -f docker-compose.production.yml exec -T backend python manage.py load_tags
            
            echo "🥕 Loading ingredients..."
            sudo docker compose -f docker-compose.production.yml exec -T backend python manage.py load_ingredients --file=/home/${{ secrets.USER }}/foodgram/data/ingredients.csv
            
            echo "📦 Collecting static files..."
            sudo docker compose -f docker-compose.production.yml exec -T backend python manage.py collectstatic --noinput
            
            echo ""
            echo "✅✅✅ DEPLOYMENT COMPLETED SUCCESSFULLY! ✅✅✅"
            echo ""
            echo "📊 Final container status:"
            sudo docker compose -f docker-compose.production.yml ps
            echo ""
            echo "🌐 Site should be available at: http://${{ secrets.HOST }}"

  send_message:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Send message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ **Деплой Foodgram успешно выполнен!**
            
            📦 **Репозиторий:** ${{ github.repository }}
            🔍 **Коммит:** ${{ github.sha }}
            👤 **Автор:** ${{ github.actor }}
            
            🌐 **Ссылка:** http://${{ secrets.HOST }}
            
            🗑️ **Старые тома удалены**
            🚀 **Свежий старт выполнен**