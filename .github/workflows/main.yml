name: Foodgram workflow

on:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: foodgram_user
          POSTGRES_PASSWORD: foodgram_password
          POSTGRES_DB: foodgram
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8==6.0.0
          pip install black==23.3.0
          pip install -r ./backend/foodgram/requirements.txt

  build_backend_and_push_to_docker_hub:
    name: Push backend Docker image to DockerHub
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Push backend to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./backend/foodgram
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/foodgram_backend:latest

  build_frontend_and_push_to_docker_hub:
    name: Push frontend Docker image to DockerHub
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Push frontend to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/foodgram_frontend:latest

  build_nginx_and_push_to_docker_hub:
    name: Push nginx Docker image to DockerHub
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Push nginx to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./infra
          dockerfile: Dockerfile.nginx
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/foodgram_nginx:latest

  deploy:
    runs-on: ubuntu-latest
    needs: 
      - build_backend_and_push_to_docker_hub
      - build_frontend_and_push_to_docker_hub
      - build_nginx_and_push_to_docker_hub
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        
      - name: Create necessary directories on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            mkdir -p /home/${{ secrets.USER }}/foodgram/infra
            mkdir -p /home/${{ secrets.USER }}/foodgram/data
            mkdir -p /home/${{ secrets.USER }}/foodgram/docs
            sudo chown -R ${{ secrets.USER }}:${{ secrets.USER }} /home/${{ secrets.USER }}/foodgram
            echo "✅ Directories created"
            
      - name: Copy docker-compose.production.yml
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "infra/docker-compose.production.yml"
          target: "/home/${{ secrets.USER }}/foodgram/infra/"
          strip_components: 1
          rm: false
          overwrite: true
            
      - name: Copy nginx.conf
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "infra/nginx.conf"
          target: "/home/${{ secrets.USER }}/foodgram/infra/"
          strip_components: 1
          rm: false
          overwrite: true
            
      - name: Copy ingredients.csv
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "data/ingredients.csv"
          target: "/home/${{ secrets.USER }}/foodgram/data/"
          strip_components: 1
          rm: false
          overwrite: true
          
      - name: Deploy with docker compose - clean start with migrations
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd /home/${{ secrets.USER }}/foodgram/infra
            
            echo "🧹 ПОЛНАЯ ОЧИСТКА СТАРЫХ ДАННЫХ..."
            sudo docker compose -f docker-compose.production.yml down -v
            sudo docker volume prune -f
            sudo docker system prune -f
            
            echo "🐳 Pulling fresh Docker images..."
            sudo docker compose -f docker-compose.production.yml pull
            
            echo "📝 Creating .env file..."
            rm -f .env
            echo "POSTGRES_USER=foodgram_user" > .env
            echo "POSTGRES_PASSWORD=foodgram_password" >> .env
            echo "POSTGRES_DB=foodgram" >> .env
            echo "DB_NAME=foodgram" >> .env
            echo "DB_USER=foodgram_user" >> .env
            echo "DB_PASSWORD=foodgram_password" >> .env
            echo "DB_HOST=db" >> .env
            echo "DB_PORT=5432" >> .env
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
            echo "DEBUG=False" >> .env
            echo "ALLOWED_HOSTS=${{ secrets.HOST }},localhost,127.0.0.1" >> .env
            echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" >> .env
            
            echo "✅ .env file created"
            
            echo "🚀 Starting fresh containers..."
            sudo docker compose -f docker-compose.production.yml up -d
            
            echo "⏳ Waiting for database to be ready (45 seconds)..."
            sleep 45
            
            echo "📊 Container status:"
            sudo docker compose -f docker-compose.production.yml ps
            
            # Проверяем, запустился ли backend
            if sudo docker compose -f docker-compose.production.yml ps | grep -q "backend.*Up"; then
              
              echo "🔥 ПРИНУДИТЕЛЬНОЕ УДАЛЕНИЕ СТАРОЙ БАЗЫ ДАННЫХ..."
              # Удаляем SQLite если он есть
              sudo docker exec foodgram-backend bash -c "rm -f /app/db.sqlite3" || true
              
              echo "🗑️ ОЧИСТКА СТАРЫХ МИГРАЦИЙ..."
              # Удаляем старые миграции
              sudo docker exec foodgram-backend bash -c "find . -path '*/migrations/*.py' -not -name '__init__.py' -delete" || true
              sudo docker exec foodgram-backend bash -c "find . -path '*/migrations/*.pyc' -delete" || true
              
              echo "🔄 СБРОС ВСЕХ МИГРАЦИЙ В POSTGRES..."
              # Откатываем все миграции
              sudo docker exec foodgram-backend python manage.py migrate user zero || true
              sudo docker exec foodgram-backend python manage.py migrate food zero || true
              sudo docker exec foodgram-backend python manage.py migrate auth zero || true
              sudo docker exec foodgram-backend python manage.py migrate contenttypes zero || true
              sudo docker exec foodgram-backend python manage.py migrate admin zero || true
              sudo docker exec foodgram-backend python manage.py migrate sessions zero || true
              
              echo "🆕 СОЗДАНИЕ НОВЫХ МИГРАЦИЙ ДЛЯ ВСЕХ ПРИЛОЖЕНИЙ..."
              # Создаем миграции для каждого приложения
              sudo docker exec foodgram-backend python manage.py makemigrations user
              sudo docker exec foodgram-backend python manage.py makemigrations food
              sudo docker exec foodgram-backend python manage.py makemigrations
              
              echo "▶️ ПРИМЕНЕНИЕ ВСЕХ МИГРАЦИЙ..."
              sudo docker exec foodgram-backend python manage.py migrate
              
              echo "🔍 ПРОВЕРКА СОЗДАНИЯ ТАБЛИЦ..."
              sudo docker exec foodgram-backend python -c "
import django
django.setup()
from django.db import connection
tables = connection.introspection.table_names()
print('📋 Созданные таблицы:')
for table in sorted(tables):
    print(f'  - {table}')
if 'user_subscription' in tables:
    print('✅ user_subscription таблица УСПЕШНО создана!')
else:
    print('❌ КРИТИЧЕСКАЯ ОШИБКА: user_subscription таблица НЕ создана!')
    # Создаем таблицу вручную если нужно
    with connection.cursor() as cursor:
        cursor.execute('''
            CREATE TABLE IF NOT EXISTS user_subscription (
                id SERIAL PRIMARY KEY,
                user_id INTEGER NOT NULL,
                author_id INTEGER NOT NULL,
                created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
            );
        ''')
        cursor.execute('''
            CREATE UNIQUE INDEX IF NOT EXISTS user_subscription_unique 
            ON user_subscription (user_id, author_id);
        ''')
    print('✅ user_subscription таблица создана вручную!')
"
              
              echo "🏷️ Loading tags..."
              sudo docker exec foodgram-backend python manage.py load_tags || true
              
              echo "🥕 Loading ingredients..."
              sudo docker exec foodgram-backend python manage.py load_ingredients --file=/home/${{ secrets.USER }}/foodgram/data/ingredients.csv || true
              
              echo "📦 Collecting static files..."
              sudo docker exec foodgram-backend python manage.py collectstatic --noinput || true
              
              echo "✅ ФИНАЛЬНАЯ ПРОВЕРКА:"
              sudo docker exec foodgram-backend python -c "
import django
django.setup()
from django.db import connection
from django.contrib.auth import get_user_model
User = get_user_model()
tables = connection.introspection.table_names()
if 'user_subscription' in tables:
    print('🎉 ВСЕ ТАБЛИЦЫ УСПЕШНО СОЗДАНЫ!')
    # Пробуем создать тестовую запись
    try:
        if User.objects.count() > 0:
            print('✅ База данных готова к работе!')
    except:
        pass
"
            else
              echo "❌ Backend container is not running!"
              echo "📋 Checking logs..."
              sudo docker compose -f docker-compose.production.yml logs backend | tail -50
            fi
            
            echo ""
            echo "✅✅✅ DEPLOYMENT COMPLETED SUCCESSFULLY! ✅✅✅"
            echo ""
            echo "📊 Final container status:"
            sudo docker compose -f docker-compose.production.yml ps

  send_message:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Send message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ **Деплой Foodgram успешно выполнен!**
            
            📦 **Репозиторий:** ${{ github.repository }}
            🔍 **Коммит:** ${{ github.sha }}
            👤 **Автор:** ${{ github.actor }}
            
            🌐 **Ссылка:** http://${{ secrets.HOST }}
            
            🗑️ **Старые тома удалены**
            🔄 **Все миграции пересозданы**
            🚀 **Свежий старт выполнен**