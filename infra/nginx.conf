server {
    listen 80;
    client_max_body_size 10M;
    server_name localhost;

    # Проксирование API запросов на backend
    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://backend:8000;
    }

    # Проксирование админки на backend
    location /admin/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://backend:8000;
    }

    # Статические файлы Django
    location /static/ {
        alias /var/html/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Медиа файлы (загруженные пользователями)
    location /media/ {
        alias /var/html/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Документация API
    location /api/docs/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/redoc.html;
    }
    
    # Фронтенд приложение - ИСПРАВЛЕНО: статика фронтенда лежит в корне
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri /index.html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Явно указываем location для статических файлов фронтенда
    location /static/js/ {
        alias /usr/share/nginx/html/static/js/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /static/css/ {
        alias /usr/share/nginx/html/static/css/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /static/media/ {
        alias /usr/share/nginx/html/static/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Обработка ошибок
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}