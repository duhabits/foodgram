version: '3.8'

services:
  db:
    container_name: foodgram-db
    image: postgres:15-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: foodgram-backend
    build:
      context: ../backend/foodgram
      dockerfile: Dockerfile
    restart: always
    volumes:
      - static_volume:/app/static/
      - media_volume:/app/media/
      - ../data:/app/data 
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
            python manage.py load_tags && 
            python manage.py load_ingredients --file=data/ingredients.csv &&
            python manage.py collectstatic --noinput &&
            gunicorn --bind 0.0.0.0:8000 foodgram.wsgi:application"
  frontend:
    container_name: foodgram-frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_static:/build
    command: ["sh", "-c", "echo 'Frontend built successfully' && tail -f /dev/null"]

  nginx:
    container_name: foodgram-nginx
    image: nginx:1.25.4-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_static:/usr/share/nginx/html/
      - static_volume:/var/html/static/
      - media_volume:/var/html/media/
      - ../docs/:/usr/share/nginx/html/api/docs/
    depends_on:
      - backend

volumes:
  postgres_data:
  static_volume:
  media_volume:
  frontend_static: